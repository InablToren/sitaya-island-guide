<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sitaya Island Guide</title>

  <meta name="theme-color" content="#396A82">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sitaya Guide">
  <link rel="apple-touch-icon" href="sitaya_email_logo.png">

  <!-- Brand font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    :root {
      --gold:       #FABA76;
      --gold-dk:    #E09D50;
      --blue:       #396A82;
      --blue-lt:    #A8E0FF;
      --blue-dk:    #2A506A;
      --bg:         #FFFDFB;
      --white:      #FFFFFF;
      --charcoal:   #3A3A3A;
      --gray:       #7A7A7A;
      --gray-lt:    #EEE9E2;
      --border:     #E4DDD4;
      --green:      #3A8A5C;
      --orange-sun: #E8872A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Alegreya Sans', sans-serif;
      background: var(--bg);
      color: var(--charcoal);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 680px; margin: 0 auto; background: var(--bg); min-height: 100vh; }

    /* ── Header ── */
    .header {
      background: var(--white);
      padding: 0;
      border-bottom: 2px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 20px rgba(57,106,130,.12);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      gap: 12px;
    }
    .header-logo {
      height: 58px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .header-tagline {
      font-size: 12px;
      font-weight: 500;
      color: var(--blue);
      letter-spacing: .6px;
      text-align: right;
      line-height: 1.4;
      text-transform: uppercase;
    }
    .header-tagline span {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: var(--charcoal);
      letter-spacing: 0;
      text-transform: none;
    }

    /* ── Location bar ── */
    .loc-bar {
      background: var(--blue);
      color: rgba(255,255,255,.88);
      padding: 9px 18px;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: .1px;
    }
    .loc-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--gold);
    }
    .loc-dot.found { background: #6EE7A0; animation: pulse 2.5s infinite; }
    .loc-dot.error { background: #F87171; }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(1.6); }
    }

    /* ── Map ── */
    #map { height: 200px; width: 100%; z-index: 1; }

    /* ── Controls ── */
    .controls {
      background: var(--white);
      padding: 14px 18px 13px;
      border-bottom: 1px solid var(--border);
    }
    .radius-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 13px;
    }
    .radius-row label { font-size: 13px; color: var(--gray); white-space: nowrap; font-weight: 400; }
    .radius-val { font-size: 13px; font-weight: 700; color: var(--blue); white-space: nowrap; min-width: 36px; text-align: right; }
    input[type=range] {
      flex: 1; -webkit-appearance: none;
      height: 3px; background: var(--gray-lt); border-radius: 2px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      background: var(--gold); border-radius: 50%; cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,.2);
    }

    /* Category chips */
    .cats { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .cats::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--gray);
      font-family: 'Alegreya Sans', sans-serif;
      transition: all .18s;
      display: flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .cat-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
    .cat-btn:hover:not(.active):not(.beach-off) { border-color: var(--blue); color: var(--blue); }
    .cat-btn.beach-off { opacity: .35; cursor: not-allowed; pointer-events: none; }

    /* ── Results header ── */
    .results-hdr {
      padding: 14px 18px 8px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .results-hdr h2 { font-size: 16px; font-weight: 700; color: var(--charcoal); }
    .time-badge {
      font-size: 12px;
      background: var(--blue);
      color: var(--white);
      padding: 3px 10px;
      border-radius: 12px;
      white-space: nowrap;
      font-weight: 500;
      flex-shrink: 0;
      letter-spacing: .3px;
    }

    /* ── Sunset notice ── */
    .sunset-notice {
      margin: 0 16px 8px;
      background: linear-gradient(135deg, var(--blue-dk), var(--blue));
      color: var(--gold);
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 13.5px;
      display: none; align-items: center; gap: 9px;
      line-height: 1.4;
      font-style: italic;
    }
    .sunset-notice.show { display: flex; }

    /* ── Cards ── */
    .cards { padding: 4px 14px 36px; display: flex; flex-direction: column; gap: 11px; }

    .card {
      background: var(--white);
      border-radius: 14px;
      padding: 16px 17px;
      border: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
      box-shadow: 0 2px 12px rgba(57,106,130,.07);
      animation: slideUp .28s ease both;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .card-row1 { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .card-cat  { font-size:12px; color:var(--gray); display:flex; align-items:center; gap:4px; font-weight:500; letter-spacing:.2px; }
    .card-dist {
      font-size: 12px; font-weight: 700; color: var(--blue);
      background: var(--blue-lt); padding: 2px 9px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .card-name { font-size: 17px; font-weight: 700; color: var(--charcoal); line-height: 1.25; }
    .card-note {
      font-size: 13.5px; color: var(--charcoal); font-style: italic;
      line-height: 1.5; padding: 8px 12px;
      background: #FFF8F0; border-radius: 8px;
      border-left: 3px solid var(--gold);
    }
    .card-hours {
      font-size: 12.5px; color: var(--gray);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .open-tag  { color: var(--green); font-weight: 700; }
    .closed-tag { color: #B45309; font-weight: 700; }

    .card-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: var(--gold);
      color: var(--white);
      border: none; border-radius: 10px;
      padding: 11px 16px; font-size: 15px; font-weight: 700;
      font-family: 'Alegreya Sans', sans-serif;
      cursor: pointer; width: 100%; text-decoration: none;
      margin-top: 3px; transition: background .18s;
      letter-spacing: .2px;
    }
    .card-btn:hover, .card-btn:active { background: var(--gold-dk); }

    /* ── Empty state ── */
    .empty { text-align:center; padding:48px 24px; color:var(--gray); }
    .empty .big { font-size:54px; margin-bottom:14px; }
    .empty h3   { font-size:20px; color:var(--charcoal); margin-bottom:9px; font-weight:700; }
    .empty p    { font-size:14.5px; line-height:1.6; }

    /* ── Divider between category groups on map ── */
    .section-label {
      font-size: 11px; font-weight: 700; color: var(--blue);
      letter-spacing: 1px; text-transform: uppercase;
      padding: 10px 18px 0;
      opacity: .7;
    }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 18px 20px 28px;
      font-size: 12.5px; color: var(--gray);
      border-top: 1px solid var(--border);
      font-style: italic;
    }

    @media (min-width: 540px) {
      .cards { display: grid; grid-template-columns: repeat(2,1fr); }
      #map { height: 240px; }
    }
  </style>
</head>

  <!-- Cards -->

  <footer>
    Curated with love by Sitaya Beachfront Villas &nbsp;·&nbsp; Hours are approximate — always good to call ahead!
  </footer>
</div>

  { name:"ATV Station by Speed",             lat:9.7291957, lng:100.0440633,cat:"activities", emoji:"🚵",
    note:"Explore the jungle by ATV! An absolute blast — adventure seekers, this is for you! 🌿",
    open:9,  close:18 },
  { name:"Martial Arts Academy — Muay Thai", lat:9.7359075, lng:99.9800451, cat:"activities", emoji:"🥊",
    note:"Train like a local! Great group or private Muay Thai lessons — an unforgettable island experience!",
    open:8,  close:20 },
  { name:"Casa Luma — For Young Kids",       lat:9.7280896, lng:100.0035737,cat:"activities", emoji:"🧒",
    note:"The little ones deserve fun too! Great indoor play space for families! 👨‍👩‍👧‍👦",
    open:9,  close:18 },
  { name:"CoCo Family Play Center",          lat:9.7194619, lng:99.9923203, cat:"activities", emoji:"🎠",
    note:"Family-friendly fun for kids of all ages! Perfect for a morning of play and big smiles! 😄",
    open:9,  close:18 },
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const ISLAND = { lat:9.73, lng:100.0 };
let userLat = null, userLng = null;
let activeCat = 'all', radiusKm = 3;
let afterSunset = false, beforeSunrise = false;
let map, userMarker, placeMarkers = [];

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371, r=x=>x*Math.PI/180;
  const a=Math.sin(r(lat2-lat1)/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(r(lng2-lng1)/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}
function fmtDist(km){ return km<1 ? Math.round(km*1000)+' m' : km.toFixed(1)+' km'; }
function isOpen(p){
  const now=new Date(), h=now.getHours()+now.getMinutes()/60;
  const {open:o,close:c}=p;
  return c<o ? h>=o||h<c : h>=o&&h<c;
}
function fmtHours(p){
  if(p.isBeach) return 'Sunrise – sunset';
  const h=n=>{if(n===0||n===24)return '12am';if(n===12)return '12pm';return n<12?n+'am':(n-12)+'pm';};
  return h(p.open)+' – '+h(p.close);
}
function catLabel(c){
  return {restaurants:'Restaurant',bars:'Bar & Nightlife',beaches:'Beach',
          coffee:'Coffee & Breakfast',gyms:'Gym',activities:'Activity'}[c]||c;
}

// ─────────────────────────────────────────────
//  SUN TIMES
// ─────────────────────────────────────────────
function refreshSun(){
  const lat=userLat||ISLAND.lat, lng=userLng||ISLAND.lng;
  const t=SunCalc.getTimes(new Date(),lat,lng), now=new Date();
  afterSunset=now>t.sunset; beforeSunrise=now<t.sunrise;
  const night=afterSunset||beforeSunrise;
  document.getElementById('sunsetNotice').classList.toggle('show',night);
  const bb=document.getElementById('beachBtn');
  bb.classList.toggle('beach-off',night);
  if(night&&activeCat==='beaches'){
    activeCat='all';
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat==='all'));
  }
}

// ─────────────────────────────────────────────
//  MAP
// ─────────────────────────────────────────────
function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  map.setView([ISLAND.lat,ISLAND.lng],12);
}
function updateMapUser(lat,lng){
  if(userMarker) map.removeLayer(userMarker);
  const icon=L.divIcon({
    html:`<div style="width:18px;height:18px;background:#E8872A;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>`,
    iconSize:[18,18],iconAnchor:[9,9],className:''
  });
  userMarker=L.marker([lat,lng],{icon}).addTo(map).bindPopup('📍 You are here!');
  map.setView([lat,lng],14);
}
function updateMapPlaces(places){
  placeMarkers.forEach(m=>map.removeLayer(m));
  placeMarkers=[];
  places.forEach(p=>{
    const icon=L.divIcon({
      html:`<div style="background:#396A82;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3)">${p.emoji}</div>`,
      iconSize:[28,28],iconAnchor:[14,14],className:''
    });
    placeMarkers.push(L.marker([p.lat,p.lng],{icon}).addTo(map)
      .bindPopup(`<strong>${p.name}</strong><br><em>${catLabel(p.cat)}</em>`));
  });
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render(){
  refreshSun();
  document.getElementById('timeBadge').textContent=
    new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});

  const grid=document.getElementById('cards');
  const title=document.getElementById('resultsTitle');

  if(!userLat){
    title.textContent='📍 Waiting for your location…';
    grid.innerHTML=`<div class="empty"><div class="big">📍</div><h3>Where are you, explorer?</h3><p>Allow location access so we can find the best spots near you!</p></div>`;
    return;
  }

  let filtered=PLACES.filter(p=>{
    if(activeCat!=='all'&&p.cat!==activeCat) return false;
    if(p.isBeach&&(afterSunset||beforeSunrise)) return false;
    if(!isOpen(p)) return false;
    if(haversine(userLat,userLng,p.lat,p.lng)>radiusKm) return false;
    return true;
  }).sort((a,b)=>haversine(userLat,userLng,a.lat,a.lng)-haversine(userLat,userLng,b.lat,b.lng));

  updateMapPlaces(filtered);

  if(!filtered.length){
    title.textContent='🌴 Nothing nearby right now';
    grid.innerHTML=`<div class="empty"><div class="big">🔭</div><h3>Explore a little further?</h3><p>Try expanding the radius or switching categories — Koh Phangan is full of treasures!</p></div>`;
    return;
  }

  title.textContent=filtered.length===1?'🌟 1 amazing spot near you!':`🌟 ${filtered.length} amazing spots near you!`;

  grid.innerHTML=filtered.map((p,i)=>{
    const dist=haversine(userLat,userLng,p.lat,p.lng);
    const open=isOpen(p);
    const url=`https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
    return `
      <div class="card" style="animation-delay:${i*.04}s">
        <div class="card-row1">
          <span class="card-cat">${p.emoji} ${catLabel(p.cat)}</span>
          <span class="card-dist">📍 ${fmtDist(dist)}</span>
        </div>
        <div class="card-name">${p.name}</div>
        ${p.note?`<div class="card-note">${p.note}</div>`:''}
        <div class="card-hours">
          <span class="${open?'open-tag':'closed-tag'}">${open?'✅ Open now':'⏰ Closed'}</span>
          &nbsp;·&nbsp; ${fmtHours(p)}
        </div>
        <a href="${url}" target="_blank" rel="noopener" class="card-btn">🗺️ Take me there!</a>
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
//  GEOLOCATION
// ─────────────────────────────────────────────
function initLocation(){
  const dot=document.getElementById('locDot'), text=document.getElementById('locText');
  if(!navigator.geolocation){
    dot.className='loc-dot error';
    text.textContent='Location not supported — showing all spots on the island! 🌴';
    return;
  }
  navigator.geolocation.watchPosition(
    pos=>{
      userLat=pos.coords.latitude; userLng=pos.coords.longitude;
      dot.className='loc-dot found';
      text.textContent=`📍 You're on the map! Showing spots within ${radiusKm} km`;
      updateMapUser(userLat,userLng);
      render();
    },
    err=>{
      dot.className='loc-dot error';
      text.textContent=err.code===1?'🙈 Location blocked — please enable it in your browser settings!':"😅 Can't find you right now — try refreshing!";
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:30000}
  );
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
document.getElementById('radiusSlider').addEventListener('input',e=>{
  radiusKm=parseFloat(e.target.value);
  document.getElementById('radiusVal').textContent=radiusKm+' km';
  if(userLat) document.getElementById('locText').textContent=`📍 You're on the map! Showing spots within ${radiusKm} km`;
  render();
});
document.getElementById('cats').addEventListener('click',e=>{
  const btn=e.target.closest('.cat-btn');
  if(!btn||btn.classList.contains('beach-off')) return;
  activeCat=btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b===btn));
  render();
});

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  initMap(); refreshSun(); render(); initLocation();
  setInterval(()=>{ refreshSun(); if(userLat) render(); },60_000);
});
</script>
</body>
</html>
